name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DO_NOT_TRACK: 1

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: bun run check

      - name: Build community.json
        run: bun run build

      - name: Create release with community.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
            gh release create "$TAG" --title "$TAG" --notes "Manual build from ${GITHUB_SHA::7}." community.json
          else
            gh release create "$TAG" --title "$TAG" --generate-notes community.json
          fi
